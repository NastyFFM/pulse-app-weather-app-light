<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Light</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg, #0d1117);
      color: var(--text, #c9d1d9);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--teal, #58a6ff);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-row input {
      flex: 1;
      background: var(--bg-card, #161b22);
      border: 1px solid var(--border, #30363d);
      color: var(--text, #c9d1d9);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .search-row input:focus {
      border-color: var(--teal, #58a6ff);
    }
    .search-row button {
      background: var(--teal, #58a6ff);
      color: #0d1117;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .search-row button:hover { opacity: 0.85; }
    .card {
      background: var(--bg-card, #161b22);
      border: 1px solid var(--border, #30363d);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .city-name {
      font-size: 1rem;
      font-weight: 600;
    }
    .city-country {
      font-size: 0.75rem;
      color: var(--text-dim, #8b949e);
    }
    .remove-btn {
      background: none;
      border: none;
      color: var(--text-dim, #8b949e);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }
    .remove-btn:hover { color: #f85149; }
    .temp-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .temp {
      font-size: 2.4rem;
      font-weight: 300;
      line-height: 1;
    }
    .weather-icon {
      font-size: 2rem;
    }
    .description {
      font-size: 0.85rem;
      color: var(--text-dim, #8b949e);
      text-transform: capitalize;
    }
    .details {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .detail {
      font-size: 0.78rem;
      color: var(--text-dim, #8b949e);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .detail span { color: var(--text, #c9d1d9); }
    .forecast {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .forecast::-webkit-scrollbar { height: 3px; }
    .forecast::-webkit-scrollbar-track { background: transparent; }
    .forecast::-webkit-scrollbar-thumb { background: var(--border, #30363d); border-radius: 2px; }
    .fc-day {
      flex-shrink: 0;
      text-align: center;
      background: var(--bg, #0d1117);
      border-radius: 8px;
      padding: 6px 10px;
      min-width: 52px;
    }
    .fc-day .day-name {
      font-size: 0.7rem;
      color: var(--text-dim, #8b949e);
      margin-bottom: 4px;
    }
    .fc-day .fc-icon { font-size: 1.1rem; margin-bottom: 2px; }
    .fc-day .fc-temp {
      font-size: 0.8rem;
      font-weight: 600;
    }
    .fc-day .fc-low {
      font-size: 0.72rem;
      color: var(--text-dim, #8b949e);
    }
    .loading {
      text-align: center;
      color: var(--text-dim, #8b949e);
      padding: 20px;
      font-size: 0.85rem;
    }
    .error {
      color: #f85149;
      font-size: 0.85rem;
      padding: 10px 0;
    }
    .empty {
      text-align: center;
      color: var(--text-dim, #8b949e);
      padding: 40px 16px;
      font-size: 0.9rem;
    }
    .empty .hint { margin-top: 8px; font-size: 0.8rem; opacity: 0.6; }
    .updated {
      font-size: 0.7rem;
      color: var(--text-dim, #8b949e);
      margin-top: 6px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🌤 Weather Light</h1>
    <div class="search-row">
      <input type="text" id="cityInput" placeholder="Stadt suchen..." autocomplete="off">
      <button onclick="addCity()">+ Add</button>
    </div>
    <div id="cards"></div>
  </div>

  <script>
    // PulseOS SDK stub for standalone use
    if (typeof PulseOS === 'undefined') {
      window.PulseOS = {
        onInput: function() {},
        emit: function() {},
        onDataChanged: function() {},
        saveState: function(d) { try { localStorage.setItem('weather-app-light', JSON.stringify(d)); } catch(e){} },
        loadState: function() {
          try { return Promise.resolve(JSON.parse(localStorage.getItem('weather-app-light') || 'null')); } catch(e) { return Promise.resolve(null); }
        }
      };
    }

    const WMO_ICONS = {
      0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
      45:'🌫️',48:'🌫️',
      51:'🌦️',53:'🌦️',55:'🌧️',
      56:'🌨️',57:'🌨️',
      61:'🌧️',63:'🌧️',65:'🌧️',
      66:'🌨️',67:'🌨️',
      71:'❄️',73:'❄️',75:'❄️',77:'🌨️',
      80:'🌦️',81:'🌧️',82:'⛈️',
      85:'❄️',86:'❄️',
      95:'⛈️',96:'⛈️',99:'⛈️'
    };
    const WMO_DESC = {
      0:'Klar',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bedeckt',
      45:'Nebel',48:'Nebel mit Reif',
      51:'Nieselregen leicht',53:'Nieselregen',55:'Nieselregen stark',
      61:'Regen leicht',63:'Regen',65:'Starkregen',
      71:'Schnee leicht',73:'Schnee',75:'Starker Schnee',
      80:'Schauer',81:'Schauer stark',82:'Heftiger Schauer',
      95:'Gewitter',96:'Gewitter mit Hagel',99:'Gewitter mit Hagel'
    };

    let cities = [];

    async function init() {
      // Try PulseOS first, then localStorage
      let saved = null;
      try {
        if (typeof PulseOS !== 'undefined' && PulseOS.loadState) {
          saved = await PulseOS.loadState();
        }
      } catch(e) {}
      if (!saved) {
        try { saved = JSON.parse(localStorage.getItem('weather-app-light') || 'null'); } catch(e) {}
      }
      if (saved && saved.cities) {
        cities = saved.cities;
      }
      if (cities.length === 0) {
        cities = [{ name: 'Berlin', country: 'DE', lat: 52.52, lon: 13.41 }];
      }
      renderAll();
    }

    function save() {
      const data = { cities };
      try { PulseOS.saveState(data); } catch(e) {}
      try { localStorage.setItem('weather-app-light', JSON.stringify(data)); } catch(e) {}
    }

    async function addCity() {
      const input = document.getElementById('cityInput');
      const query = input.value.trim();
      if (!query) return;
      input.value = '';
      showLoading(query);
      try {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=de&format=json`);
        const data = await res.json();
        if (!data.results || data.results.length === 0) {
          showError(`Stadt "${query}" nicht gefunden.`);
          return;
        }
        const r = data.results[0];
        if (cities.find(c => Math.abs(c.lat - r.latitude) < 0.1)) {
          showError('Stadt bereits hinzugefügt.');
          return;
        }
        cities.push({ name: r.name, country: r.country_code || '', lat: r.latitude, lon: r.longitude });
        save();
        renderAll();
        PulseOS.emit('cities', cities);
      } catch(e) {
        showError('Geocoding fehlgeschlagen.');
      }
    }

    function removeCity(idx) {
      cities.splice(idx, 1);
      save();
      renderAll();
    }

    function showLoading(name) {
      const cards = document.getElementById('cards');
      const tmp = document.createElement('div');
      tmp.className = 'loading';
      tmp.id = 'tmp-loading';
      tmp.textContent = `Lade ${name}...`;
      cards.prepend(tmp);
    }

    function showError(msg) {
      const el = document.getElementById('tmp-loading');
      if (el) el.remove();
      const cards = document.getElementById('cards');
      const err = document.createElement('div');
      err.className = 'error';
      err.textContent = '⚠ ' + msg;
      cards.prepend(err);
      setTimeout(() => err.remove(), 4000);
    }

    async function fetchWeather(city) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`;
      const res = await fetch(url);
      return res.json();
    }

    function dayName(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('de-DE', { weekday: 'short' });
    }

    function buildCard(city, idx, weather) {
      const c = weather.current;
      const d = weather.daily;
      const icon = WMO_ICONS[c.weathercode] || '🌡️';
      const desc = WMO_DESC[c.weathercode] || '';
      const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

      let forecastHTML = '';
      for (let i = 1; i < d.time.length; i++) {
        forecastHTML += `
          <div class="fc-day">
            <div class="day-name">${dayName(d.time[i])}</div>
            <div class="fc-icon">${WMO_ICONS[d.weathercode[i]] || '🌡️'}</div>
            <div class="fc-temp">${Math.round(d.temperature_2m_max[i])}°</div>
            <div class="fc-low">${Math.round(d.temperature_2m_min[i])}°</div>
          </div>`;
      }

      return `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="city-name">${city.name}</div>
              <div class="city-country">${city.country}</div>
            </div>
            <button class="remove-btn" onclick="removeCity(${idx})" title="Entfernen">✕</button>
          </div>
          <div class="temp-row">
            <div class="weather-icon">${icon}</div>
            <div class="temp">${Math.round(c.temperature_2m)}°C</div>
          </div>
          <div class="description">${desc}</div>
          <div class="details">
            <div class="detail">💧 Luftfeuchtigkeit <span>${c.relativehumidity_2m}%</span></div>
            <div class="detail">💨 Wind <span>${Math.round(c.windspeed_10m)} km/h</span></div>
            <div class="detail">🌡 Gefühlt <span>${Math.round(c.apparent_temperature)}°C</span></div>
          </div>
          <div class="forecast">${forecastHTML}</div>
          <div class="updated">Aktualisiert: ${now}</div>
        </div>`;
    }

    async function renderAll() {
      const el = document.getElementById('tmp-loading');
      if (el) el.remove();

      if (cities.length === 0) {
        document.getElementById('cards').innerHTML = `
          <div class="empty">
            Keine Städte hinzugefügt.
            <div class="hint">Suche nach einer Stadt oben.</div>
          </div>`;
        return;
      }

      const promises = cities.map((c, i) =>
        fetchWeather(c).then(w => ({ city: c, idx: i, weather: w })).catch(() => null)
      );

      document.getElementById('cards').innerHTML = '<div class="loading">Lade Wetterdaten...</div>';
      const results = await Promise.all(promises);
      document.getElementById('cards').innerHTML = results
        .filter(r => r && r.weather && r.weather.current)
        .map(r => buildCard(r.city, r.idx, r.weather))
        .join('');
    }

    // PulseOS Graph input: receive city name
    PulseOS.onInput('city', function(data) {
      if (typeof data === 'string' && data.trim()) {
        document.getElementById('cityInput').value = data.trim();
        addCity();
      }
    });

    // Refresh when external data changes
    PulseOS.onDataChanged(function() { init(); });

    // Enter key to add
    document.getElementById('cityInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addCity();
    });

    // Auto-refresh every 10 minutes
    setInterval(renderAll, 10 * 60 * 1000);

    init();
  </script>
  <script src="/sdk.js" onerror="void 0"></script>
</body>
</html>
